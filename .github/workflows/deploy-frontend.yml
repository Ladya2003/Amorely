name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Node 24 для actions (см. https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          # CRA в CI падает на eslint warnings — локально они только в консоли
          CI: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url || steps.deployment4.outputs.page_url || steps.deployment5.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1/5)
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 2/5)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 3/5)
        id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 4/5)
        id: deployment4
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure' && steps.deployment4.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 5/5)
        id: deployment5
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure' && steps.deployment4.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Verify deployment succeeded
        if: >-
          steps.deployment.outcome != 'success' &&
          steps.deployment2.outcome != 'success' &&
          steps.deployment3.outcome != 'success' &&
          steps.deployment4.outcome != 'success' &&
          steps.deployment5.outcome != 'success'
        run: |
          echo "::error::GitHub Pages deploy failed after 5 attempts (HTTP 503 is usually a temporary GitHub outage — see https://www.githubstatus.com/)"
          exit 1
